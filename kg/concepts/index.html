<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>概念图谱 | 分子生物学知识库</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .back { color: #667eea; text-decoration: none; margin-bottom: 20px; display: inline-block; }
        h1 { color: #667eea; margin-bottom: 20px; }
        
        /* 图谱容器 */
        #graph-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        
        /* 控制面板 */
        .controls {
            background: #f8f9fa;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .control-group label {
            font-size: 0.9rem;
            color: #555;
        }
        .control-group select, .control-group input {
            padding: 6px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .btn {
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn:hover { background: #764ba2; }
        
        /* 图例 */
        .legend {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-left: auto;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        /* 信息面板 */
        #info-panel {
            position: fixed;
            right: 20px;
            top: 100px;
            width: 300px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 20px;
            display: none;
        }
        #info-panel.active { display: block; }
        #info-panel h3 {
            color: #667eea;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        #info-panel .info-section {
            margin-bottom: 15px;
        }
        #info-panel .info-label {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 5px;
        }
        #info-panel .info-value {
            font-size: 0.95rem;
            color: #333;
        }
        #info-panel .related-nodes {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 5px;
        }
        #info-panel .related-tag {
            background: #f0f0f0;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        #info-panel .related-tag:hover {
            background: #667eea;
            color: white;
        }
        
        /* SVG样式 */
        svg { display: block; }
        .node { cursor: pointer; }
        .node circle {
            stroke: white;
            stroke-width: 2px;
            transition: all 0.3s;
        }
        .node:hover circle {
            stroke: #667eea;
            stroke-width: 4px;
        }
        .node text {
            font-size: 12px;
            fill: #333;
            pointer-events: none;
            text-shadow: 0 1px 2px white;
        }
        .link {
            stroke-opacity: 0.6;
            transition: all 0.3s;
        }
        .link:hover {
            stroke-opacity: 1;
            stroke-width: 3px;
        }
        .link-label {
            font-size: 10px;
            fill: #666;
            text-anchor: middle;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../" class="back">← 返回首页</a>
        <h1>🕸️ 分子生物学概念图谱</h1>
        
        <div id="graph-container">
            <div class="controls">
                <div class="control-group">
                    <label>视图模式：</label>
                    <select id="view-mode">
                        <option value="all">全部</option>
                        <option value="central_dogma">中心法则</option>
                        <option value="regulation">调控网络</option>
                        <option value="techniques">技术方法</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>搜索：</label>
                    <input type="text" id="search-input" placeholder="输入实体名称...">
                </div>
                <button class="btn" onclick="resetZoom()">重置视图</button>
                
                <div class="legend">
                    <div class="legend-item">
                        <span class="legend-color" style="background: #e3f2fd; border: 2px solid #1976d2;"></span>
                        <span>基因</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color" style="background: #f3e5f5; border: 2px solid #7b1fa2;"></span>
                        <span>蛋白</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color" style="background: #fff3e0; border: 2px solid #f57c00;"></span>
                        <span>过程</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color" style="background: #e8f5e9; border: 2px solid #388e3c;"></span>
                        <span>技术</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color" style="background: #e0f2f1; border: 2px solid #00796b;"></span>
                        <span>概念</span>
                    </div>
                </div>
            </div>
            <svg id="graph"></svg>
        </div>
    </div>
    
    <div id="info-panel">
        <h3 id="panel-title">实体信息</h3>
        <div class="info-section">
            <div class="info-label">类型</div>
            <div class="info-value" id="panel-type">-</div>
        </div>
        <div class="info-section">
            <div class="info-label">定义</div>
            <div class="info-value" id="panel-desc">-</div>
        </div>
        <div class="info-section">
            <div class="info-label">出现章节</div>
            <div class="info-value" id="panel-chapters">-</div>
        </div>
        <div class="info-section">
            <div class="info-label">关联实体</div>
            <div class="related-nodes" id="panel-related"></div>
        </div>
    </div>

    <script>
        // 知识图谱数据
        const graphData = {
            nodes: [
                // 核心概念
                { id: "中心法则", name: "中心法则", type: "concept", group: 1, size: 30, 
                  desc: "遗传信息从DNA到RNA到蛋白质的流动方向", chapters: ["01", "03"] },
                
                // 基因相关
                { id: "DNA", name: "DNA", type: "gene", group: 2, size: 25,
                  desc: "脱氧核糖核酸，遗传信息的载体", chapters: ["01", "02", "03", "05"] },
                { id: "RNA", name: "RNA", type: "gene", group: 2, size: 25,
                  desc: "核糖核酸，参与蛋白质合成", chapters: ["01", "02", "03"] },
                { id: "基因", name: "基因", type: "gene", group: 2, size: 20,
                  desc: "具有遗传效应的DNA片段", chapters: ["01", "04"] },
                
                // 蛋白质相关
                { id: "蛋白质", name: "蛋白质", type: "protein", group: 3, size: 25,
                  desc: "生命活动的主要执行者", chapters: ["01", "02", "03"] },
                { id: "酶", name: "酶", type: "protein", group: 3, size: 20,
                  desc: "生物催化剂", chapters: ["02", "03", "06"] },
                { id: "DNA聚合酶", name: "DNA聚合酶", type: "protein", group: 3, size: 18,
                  desc: "催化DNA合成", chapters: ["03", "06"] },
                { id: "RNA聚合酶", name: "RNA聚合酶", type: "protein", group: 3, size: 18,
                  desc: "催化RNA合成", chapters: ["03"] },
                
                // 过程
                { id: "DNA复制", name: "DNA复制", type: "process", group: 4, size: 22,
                  desc: "DNA双链的精确拷贝", chapters: ["01", "03", "05"] },
                { id: "转录", name: "转录", type: "process", group: 4, size: 22,
                  desc: "DNA到RNA的信息传递", chapters: ["01", "03", "04"] },
                { id: "翻译", name: "翻译", type: "process", group: 4, size: 22,
                  desc: "RNA到蛋白质的信息传递", chapters: ["01", "03"] },
                { id: "逆转录", name: "逆转录", type: "process", group: 4, size: 18,
                  desc: "RNA到DNA的反向传递", chapters: ["01", "03"] },
                { id: "基因调控", name: "基因调控", type: "process", group: 4, size: 20,
                  desc: "控制基因表达的机制", chapters: ["04"] },
                
                // 技术
                { id: "PCR", name: "PCR", type: "technique", group: 5, size: 20,
                  desc: "聚合酶链式反应，体外扩增DNA", chapters: ["06"] },
                { id: "CRISPR", name: "CRISPR-Cas9", type: "technique", group: 5, size: 20,
                  desc: "基因编辑技术", chapters: ["06"] },
                { id: "测序", name: "DNA测序", type: "technique", group: 5, size: 18,
                  desc: "测定DNA碱基序列", chapters: ["06"] },
                
                // 其他重要概念
                { id: "密码子", name: "遗传密码", type: "concept", group: 1, size: 18,
                  desc: "三联体密码子编码氨基酸", chapters: ["03"] },
                { id: "操纵子", name: "操纵子", type: "concept", group: 1, size: 18,
                  desc: "原核生物基因调控单位", chapters: ["04"] },
                { id: "端粒", name: "端粒", type: "concept", group: 1, size: 16,
                  desc: "染色体末端的保护结构", chapters: ["05"] },
                { id: "修复", name: "DNA修复", type: "process", group: 4, size: 18,
                  desc: "修复DNA损伤的机制", chapters: ["05"] },
            ],
            links: [
                // 中心法则核心流程
                { source: "DNA", target: "DNA复制", type: "参与", value: 3 },
                { source: "DNA复制", target: "DNA", type: "产生", value: 3 },
                { source: "DNA", target: "转录", type: "模板", value: 3 },
                { source: "转录", target: "RNA", type: "产生", value: 3 },
                { source: "RNA", target: "翻译", type: "模板", value: 3 },
                { source: "翻译", target: "蛋白质", type: "产生", value: 3 },
                { source: "RNA", target: "逆转录", type: "模板", value: 2 },
                { source: "逆转录", target: "DNA", type: "产生", value: 2 },
                
                // 中心法则统领关系
                { source: "中心法则", target: "DNA复制", type: "包含", value: 2 },
                { source: "中心法则", target: "转录", type: "包含", value: 2 },
                { source: "中心法则", target: "翻译", type: "包含", value: 2 },
                { source: "中心法则", target: "逆转录", type: "补充", value: 1 },
                
                // 酶与过程的关系
                { source: "DNA聚合酶", target: "DNA复制", type: "催化", value: 3 },
                { source: "RNA聚合酶", target: "转录", type: "催化", value: 3 },
                { source: "酶", target: "DNA聚合酶", type: "父类", value: 1 },
                { source: "酶", target: "RNA聚合酶", type: "父类", value: 1 },
                
                // 基因表达调控
                { source: "基因", target: "转录", type: "过程", value: 2 },
                { source: "基因", target: "基因调控", type: "受控于", value: 2 },
                { source: "基因调控", target: "转录", type: "调控", value: 2 },
                { source: "操纵子", target: "基因调控", type: "实例", value: 2 },
                
                // 遗传密码
                { source: "密码子", target: "翻译", type: "编码", value: 2 },
                { source: "RNA", target: "密码子", type: "携带", value: 2 },
                
                // 技术与过程
                { source: "PCR", target: "DNA复制", type: "模拟", value: 2 },
                { source: "测序", target: "DNA", type: "分析", value: 2 },
                { source: "CRISPR", target: "基因", type: "编辑", value: 2 },
                
                // DNA损伤与修复
                { source: "DNA", target: "修复", type: "受保护", value: 2 },
                { source: "修复", target: "DNA复制", type: "保障", value: 1 },
                { source: "端粒", target: "DNA", type: "保护", value: 2 },
            ]
        };

        // 颜色配置
        const colors = {
            gene: "#1976d2",
            protein: "#7b1fa2",
            process: "#f57c00",
            technique: "#388e3c",
            concept: "#00796b"
        };

        // 初始化SVG
        const svg = d3.select("#graph");
        const width = 1200;
        const height = 700;
        svg.attr("width", width).attr("height", height);

        // 添加缩放行为
        const g = svg.append("g");
        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });
        svg.call(zoom);

        // 创建力导向图模拟
        const simulation = d3.forceSimulation(graphData.nodes)
            .force("link", d3.forceLink(graphData.links).id(d => d.id).distance(100))
            .force("charge", d3.forceManyBody().strength(-300))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(d => d.size + 10));

        // 绘制连线
        const link = g.append("g")
            .selectAll("line")
            .data(graphData.links)
            .enter().append("line")
            .attr("class", "link")
            .attr("stroke", "#999")
            .attr("stroke-width", d => Math.sqrt(d.value));

        // 绘制连线标签
        const linkLabel = g.append("g")
            .selectAll("text")
            .data(graphData.links)
            .enter().append("text")
            .attr("class", "link-label")
            .text(d => d.type);

        // 绘制节点
        const node = g.append("g")
            .selectAll("g")
            .data(graphData.nodes)
            .enter().append("g")
            .attr("class", "node")
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));

        // 节点圆形
        node.append("circle")
            .attr("r", d => d.size)
            .attr("fill", d => colors[d.type] || "#999")
            .attr("stroke", "white")
            .attr("stroke-width", 2);

        // 节点文字
        node.append("text")
            .attr("dx", d => d.size + 5)
            .attr("dy", ".35em")
            .text(d => d.name);

        // 节点点击事件
        node.on("click", (event, d) => {
            showInfo(d);
            // 高亮相关连接
            link.attr("stroke", l => (l.source.id === d.id || l.target.id === d.id) ? "#667eea" : "#ddd")
                .attr("stroke-opacity", l => (l.source.id === d.id || l.target.id === d.id) ? 1 : 0.2);
        });

        // 更新位置
        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            linkLabel
                .attr("x", d => (d.source.x + d.target.x) / 2)
                .attr("y", d => (d.source.y + d.target.y) / 2);

            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });

        // 拖拽函数
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        // 显示信息面板
        function showInfo(d) {
            const panel = document.getElementById('info-panel');
            panel.classList.add('active');
            
            document.getElementById('panel-title').textContent = d.name;
            document.getElementById('panel-type').textContent = 
                {gene: '基因', protein: '蛋白质', process: '分子过程', technique: '技术方法', concept: '核心概念'}[d.type] || d.type;
            document.getElementById('panel-desc').textContent = d.desc || '暂无描述';
            document.getElementById('panel-chapters').textContent = d.chapters ? d.chapters.join(', ') : '-';
            
            // 关联实体
            const related = graphData.links
                .filter(l => l.source.id === d.id || l.target.id === d.id)
                .map(l => l.source.id === d.id ? l.target : l.source);
            
            const relatedContainer = document.getElementById('panel-related');
            relatedContainer.innerHTML = related.map(r => 
                `<span class="related-tag" onclick="focusNode('${r.id}')">${r.name}</span>`
            ).join('');
        }

        // 聚焦节点
        function focusNode(nodeId) {
            const target = graphData.nodes.find(n => n.id === nodeId);
            if (target) {
                showInfo(target);
            }
        }

        // 重置视图
        function resetZoom() {
            svg.transition().duration(750).call(
                zoom.transform,
                d3.zoomIdentity
            );
            link.attr("stroke", "#999").attr("stroke-opacity", 0.6);
            document.getElementById('info-panel').classList.remove('active');
        }

        // 搜索功能
        document.getElementById('search-input').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            if (term === '') {
                node.style('opacity', 1);
                link.style('opacity', 1);
                return;
            }
            
            const matched = graphData.nodes.filter(n => 
                n.name.toLowerCase().includes(term) || 
                n.desc.toLowerCase().includes(term)
            );
            
            node.style('opacity', d => matched.includes(d) ? 1 : 0.1);
            link.style('opacity', 0.1);
        });

        // 视图模式切换
        document.getElementById('view-mode').addEventListener('change', function(e) {
            const mode = e.target.value;
            let visibleNodes = new Set();
            
            if (mode === 'all') {
                visibleNodes = new Set(graphData.nodes.map(n => n.id));
            } else if (mode === 'central_dogma') {
                visibleNodes = new Set(['DNA', 'RNA', '蛋白质', 'DNA复制', '转录', '翻译', '逆转录', '中心法则', '密码子']);
            } else if (mode === 'regulation') {
                visibleNodes = new Set(['基因', '基因调控', '操纵子', '转录', 'RNA聚合酶']);
            } else if (mode === 'techniques') {
                visibleNodes = new Set(['PCR', 'CRISPR', '测序', 'DNA', '基因', 'DNA聚合酶']);
            }
            
            node.style('display', d => visibleNodes.has(d.id) ? 'block' : 'none');
            link.style('display', d => 
                visibleNodes.has(d.source.id) && visibleNodes.has(d.target.id) ? 'block' : 'none'
            );
            linkLabel.style('display', d => 
                visibleNodes.has(d.source.id) && visibleNodes.has(d.target.id) ? 'block' : 'none'
            );
        });
    </script>
</body>
</html>
