<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{entity_name}} | 实体详情</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f7fa;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .back { color: #667eea; text-decoration: none; margin-bottom: 20px; display: inline-block; padding: 10px 0; }
        
        .entity-header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .entity-type {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }
        .entity-name {
            font-size: 2rem;
            color: #667eea;
            margin-bottom: 15px;
        }
        .entity-desc {
            color: #666;
            font-size: 1.1rem;
        }
        
        .section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .section h2 {
            color: #764ba2;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        
        .related-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .related-tag {
            background: #f0f0f0;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            color: #333;
            transition: all 0.2s;
        }
        .related-tag:hover {
            background: #667eea;
            color: white;
        }
        
        .chapter-link {
            display: block;
            padding: 12px 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            text-decoration: none;
            color: #333;
            transition: all 0.2s;
        }
        .chapter-link:hover {
            background: #667eea;
            color: white;
        }
        
        footer {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back">← 返回实体索引</a>
        
        <div class="entity-header">
            <span class="entity-type" style="background: {{type_color}}; color: {{type_text_color}};">{{type_name}}</span>
            <h1 class="entity-name">{{entity_name}}</h1>
            <p class="entity-desc">{{entity_description}}</p>
        </div>
        
        <div class="section">
            <h2>📖 定义</h2>
            <p>{{entity_definition}}</p>
        </div>
        
        <div class="section">
            <h2>🔗 关联实体</h2>
            <div class="related-list">
                {{related_entities}}
            </div>
        </div>
        
        <div class="section">
            <h2>📚 出现章节</h2>
            {{chapter_links}}
        </div>
        
        <footer>
            <p>分子生物学知识库</p>
        </footer>
    </div>
</body>
</html>
